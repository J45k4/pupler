name: Release CLI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
            asset_name: pupler-cli-linux-x64
            shell: bash
          - name: macos
            runner: macos-latest
            asset_name: pupler-cli-macos-arm64
            shell: bash
          - name: windows
            runner: windows-latest
            asset_name: pupler-cli-windows-x64.exe
            shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: bun run build:cli-bin

      - name: Prepare release asset (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: mv dist/pupler-cli "dist/${{ matrix.asset_name }}"

      - name: Prepare release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist/pupler-cli.exe "dist/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  create-release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
