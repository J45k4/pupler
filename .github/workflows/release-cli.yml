name: Release Binaries

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Binaries (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
            cli_asset_name: pupler-cli-linux-x64
            server_asset_name: pupler-server-linux-x64
          - name: macos
            runner: macos-latest
            cli_asset_name: pupler-cli-macos-arm64
            server_asset_name: pupler-server-macos-arm64
          - name: windows
            runner: windows-latest
            cli_asset_name: pupler-cli-windows-x64.exe
            server_asset_name: pupler-server-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: bun run build:cli-bin

      - name: Build server binary
        run: bun run build:server-bin

      - name: Prepare release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mv dist/pupler-cli "dist/${{ matrix.cli_asset_name }}"
          mv dist/pupler-server "dist/${{ matrix.server_asset_name }}"

      - name: Re-sign macOS binaries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --force --sign - "dist/${{ matrix.cli_asset_name }}"
          codesign --force --sign - "dist/${{ matrix.server_asset_name }}"

      - name: Prepare release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item dist/pupler-cli.exe "dist/${{ matrix.cli_asset_name }}"
          Move-Item dist/pupler-server.exe "dist/${{ matrix.server_asset_name }}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli_asset_name }}
          path: dist/${{ matrix.cli_asset_name }}
          if-no-files-found: error

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server_asset_name }}
          path: dist/${{ matrix.server_asset_name }}
          if-no-files-found: error

  create-release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
